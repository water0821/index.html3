        /* --- Chanel Inspired CSS --- */
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray: #F2F2F2;
            --border-width: 2px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--white);
            color: var(--black);
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.6;
        }

        /* 導航欄 */
        nav {
            border-bottom: var(--border-width) solid var(--black);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Landing Page Hero */
        .hero {
            text-align: center;
            padding: 120px 20px;
            border-bottom: var(--border-width) solid var(--black);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
        }

        .hero p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 50px;
        }

        .search-container {
            margin: 40px auto;
            max-width: 600px;
            position: relative;
        }
